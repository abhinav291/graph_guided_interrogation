# Netlify — Next.js frontend
#
# Env (Netlify UI): NEXT_PUBLIC_API_BASE=https://YOUR-SERVICE.onrender.com
#
# If deploy fails with "publish directory cannot be the same as base directory":
# Site settings → Build & deploy → clear Publish directory in the UI (leave blank).
# This file sets publish = ".next" relative to base = "frontend" and overrides UI.

[build]
  base = "frontend"
  command = "npm ci && npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
